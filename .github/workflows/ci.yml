name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
        env:
          JWT_ACCESS_SECRET: ci_test_access_secret_1234567890
          JWT_REFRESH_SECRET: ci_test_refresh_secret_1234567890
          COOKIE_SECRET: ci_test_cookie_secret_1234567890
          MONGO_URI: mongodb://127.0.0.1:27017/taskflow_ci_placeholder

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t taskflow-api:ci .
